<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="sign.css">
    <title>Signin Page</title>
    <style>
        body {
            background-color: rgb(245, 247, 250);
            margin: 0;
            padding: 90px 80px;
            box-sizing: border-box;
            font-family: "Roboto", sans-serif;
            overflow: auto;
        }

         @media (max-width: 675px) {
            body {
                padding: 30px 10px;
            }

            .si-sign{
                display: flex;
                flex-direction: column;
                justify-content: center;
                 align-items: center;
                gap: 10px;
                width: 100%;
            }

             .logo-div{
                margin-bottom: 2vh;
            }
        }

        @media screen and (max-width: 875px) {
            body {
                padding: 70px 60px;
            }
        }

    </style>
</head>
<body>

    <div class="logo-div">
        <img src="./images/logo.svg" alt="">
    </div>

    <div class="row">
        <div class="col-lg-6 col-md-12 col-sm-12">
            <h3 class="si-h3">Jump right in</h3>
            <h5 class="si-h5">Sign in to continue</h5>
            <div class="si-create">
                <span>New user? <a href="./signup.html">Create account</a></span>
            </div>
        </div>

        <div class="col-lg-6 col-md-12 col-sm-12 si-form">
                

                     <div class="si-sign">
                        <a onclick="signGoogle()" class="si-google"> <img src="./images/google.svg" alt=""> Sign in with Google</a>
                        <a href="" class="si-google"> <img src="./images/apple.svg" alt=""> Sign in with Apple</a>
                    </div>

                    <div class="divider">or</div>
            <div>
                <div class="mb-4 input-group">
                    <input type="email" id="emailIn" required>
                    <label for="emailIn" id="emailInLabel">Email Address</label>
                </div>
                <div class="mb-2 input-group">
                    <input type="password" id="passwordIn" required>
                    <label for="passwordIn" id="passwordInLabel">Password</label>
                     <i class="fa fa-eye si-eye" id="togglePassword"></i>
                </div>
                <a href="./forgot-password.html" class="si-forget">Forgot password?</a>

                <span id="errorMG" style="color: rgb(255, 0, 0); font-size: 12px; font-weight: 400; margin-top: 0">

                            </span>

                <button onclick="btnSignIn()" class="btn btn-primary w-100 mt-5 ff">Sign In</button>
            </div>

            <div class="chat-term">
                        <div class="si-chat">
                            <span>Trouble signing in? <a href="">Chat with us</a></span>
                        </div>
                        <div class="si-term">
                            <a href="">Privacy</a> | <a href="">Terms</a>
                        </div>
            </div>

        </div>
    </div>


<div class="fav">
        <img src="./images/touch-icon.png" alt="" class="fav-icon">
    </div>
</body>

<script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyBITqfPwhTVHiTHGshElHrKmfR1sXTSEgg",
        authDomain: "cowrywise-demo.firebaseapp.com",
        projectId: "cowrywise-demo",
        storageBucket: "cowrywise-demo.firebasestorage.app",
        messagingSenderId: "994326373062",
        appId: "1:994326373062:web:b17546ec4dcf7f22ecedc7",
        measurementId: "G-KJTESJTL8Y"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Personal Code
    const signGoogle = () => {
        signInWithPopup(auth, provider)
            .then((result)=>{
                const user = result.user;
                console.log(user);

                const allUsername = JSON.parse(localStorage.getItem('usernameList')) || [];

                // Object Declaration
                const userData = {
                    email: '',
                    fname: '',
                    lname: '',
                    username: '',
                    phone: '',
                    password: '',
                    pin: '',
                    balance: ''
                }
                const cUser = localStorage.getItem(`${user.email.toLowerCase()}`);
                if (cUser) {
                    alert('Email Address Already Exist');
                    localStorage.setItem('currentUser', `${user.email}`);

                    const loginUser = JSON.parse(localStorage.getItem(`${user.email}`));

                    if (loginUser.pin === "") {
                        alert("Proceed to Create your PIN")
                        window.location.href = 'create-pin-google.html';
                    } else {
                        // alert('Login Successful');
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    const parts = `${user.displayName}`.split(" ");

                    const fname = parts.shift();     // John
                    const lname = parts.join(" ");
                    userData.email = `${user.email}`;
                    userData.username = `@${user.email.slice(0,user.email.indexOf('@'))}`;
                    userData.fname = fname;
                    userData.lname = lname;
                    userData.balance = '0.00';

                    const userDataString = JSON.stringify(userData);
                    localStorage.setItem(`${userData.email}`, userDataString);
                    allUsername.push(`@${user.email.slice(0,user.email.indexOf('@'))}`);
                    localStorage.setItem('usernameList', JSON.stringify(allUsername));
                    localStorage.setItem('currentUser', `${user.email}`);

                    const loginUser = JSON.parse(localStorage.getItem(`${userData.email}`));

                    if (loginUser.pin === "") {
                        alert("Proceed to Create your PIN")
                        window.location.href = 'create-pin-google.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }

                    // alert(`Full Name: ${user.displayName}\nEmail: ${user.email}`)

                }
            }).catch((error)=>{
            const errorCode = error.code;
            const errorMessage = error.message;
            console.log(errorCode);
            console.log(errorMessage);
        })
    }

    window.signGoogle = signGoogle;

</script>

<script src="signIn.js"></script>

<script>
    //Password Toggle

const password = document.getElementById("passwordIn");
const toggle = document.getElementById("togglePassword");

toggle.addEventListener("click", function () {
    const type = password.getAttribute("type") === "password" ? "text" : "password";
    password.setAttribute("type", type);

    // Change icon
    this.classList.toggle("fa-eye");
    this.classList.toggle("fa-eye-slash");
});
</script>

</html>
