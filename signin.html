<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="sign.css">
    <title>Signin Page</title>
    <style>
        body {
            background-color: rgb(245, 247, 250);
            margin: 0;
            padding: 90px 80px;
            box-sizing: border-box;
            font-family: "Roboto", sans-serif;
            overflow: auto;
        }

         @media (max-width: 675px) {
            body {
                padding: 30px 10px;
            }

            .si-sign{
                display: flex;
                flex-direction: column;
                justify-content: center;
                 align-items: center;
                gap: 10px;
                width: 100%;
            }

             .logo-div{
                margin-bottom: 2vh;
            }
        }

        @media screen and (max-width: 875px) {
            body {
                padding: 70px 60px;
            }
        }

    </style>
</head>
<body>

    <div class="logo-div">
        <img src="./images/logo.svg" alt="">
    </div>

    <div class="row">
        <div class="col-lg-6 col-md-12 col-sm-12">
            <h3 class="si-h3">Jump right in</h3>
            <h5 class="si-h5">Sign in to continue</h5>
            <div class="si-create">
                <span>New user? <a href="./signup.html">Create account</a></span>
            </div>
        </div>

        <div class="col-lg-6 col-md-12 col-sm-12 si-form">
                

                     <div class="si-sign">
                        <a href="" class="si-google"> <img src="./images/google.svg" alt=""> Sign in with Google</a>
                        <a href="" class="si-google"> <img src="./images/apple.svg" alt=""> Sign in with Apple</a>
                    </div>

                    <div class="divider">or</div>
            
            <form action="">
                <div class="mb-4 input-group">
                    <input type="email" id="email" required>
                    <label for="email">Email Address</label>
                </div>
                <div class="mb-2 input-group">
                    <input type="password" id="password" required>
                    <label for="password">Password</label>
                    <!-- <img src="./images/eyes.svg" alt="" class="si-eye" id="togglePassword"> -->
                     <i class="fa fa-eye si-eye" id="togglePassword"></i>
                </div>
                <a href="#" class="si-forget">Forgot password?</a>
                <button type="submit" class="btn btn-primary w-100 mt-5 ff">Sign In</button>
            </form>

            <div class="chat-term">
                        <div class="si-chat">
                            <span>Trouble signing in? <a href="">Chat with us</a></span>
                        </div>
                        <div class="si-term">
                            <a href="">Privacy</a> | <a href="">Terms</a>
                        </div>
            </div>

        </div>
    </div>


<div class="fav">
        <img src="./images/touch-icon.png" alt="" class="fav-icon">
    </div>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");

toggle.addEventListener("click", function () {
  const type = password.getAttribute("type") === "password" ? "text" : "password";
  password.setAttribute("type", type);

  // Change icon
  this.classList.toggle("fa-eye");
  this.classList.toggle("fa-eye-slash");
});
</script>

</html>
